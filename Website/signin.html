<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloxy Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">
      <img src="logo.png" alt="Bloxy Logo" />
      <span>Bloxy</span>
    </div>
  </header>

  <main class="signin-page">
    <div class="signin-card">
      <h1>Sign In to Bloxy</h1>
      <p class="subtitle">
        Access your account and continue building, playing, and scaling.
      </p>

      <form class="signin-form">
        <div class="input-group">
          <label for="email">Username</label>
          <input type="text" id="email" placeholder="Enter your Username" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
          <a href="/forgot-password" class="settings-small-link">Forgot password?</a>
        </div>

        <button type="submit" class="signin-btn">Sign In</button>
      </form>

      <p class="signup-text">
        Dont have an account?
        <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
