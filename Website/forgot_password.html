<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reset Password - Bloxy</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="home-body">

<header class="roblox-topbar">
  <div class="brand">
    <img src="/logo.png" alt="Bloxy Logo" />
    <span>Bloxy</span>
  </div>

  <nav class="top-links">
    <a href="/login">Login</a>
    <a href="/signup">Sign Up</a>
  </nav>
</header>

<main class="settings-page">

  <section class="settings-hero">
    <div>
      <h1>Password Reset</h1>
      <p>Submit a reset request. Staff will review it before resetting your account.</p>
    </div>

    <div class="settings-profile-card">
      <img src="/logo.png" alt="Bloxy Logo">
      <div>
        <h3>Bloxy Support</h3>
        <p>Account recovery</p>
      </div>
    </div>
  </section>

  <section class="settings-grid single-settings-grid">

    <div class="settings-card">
      <h2>Request Password Reset</h2>
      <p>
        Enter your username and proof/details so staff can verify the account is yours.
      </p>

      <input id="resetUsername" placeholder="Username">

      <textarea id="resetDetails" placeholder="Add details like when you created the account, old password hints, previous profile picture, Blocks balance, friends, or anything staff can verify."></textarea>

      <button onclick="submitReset()">Submit Reset Request</button>

      <p id="resetStatus" class="settings-status"></p>

      <a href="/login" class="settings-small-link">Back to login</a>
    </div>

  </section>

</main>

<script>
function submitReset() {
  const username = document.getElementById("resetUsername").value.trim();
  const details = document.getElementById("resetDetails").value.trim();
  const status = document.getElementById("resetStatus");

  status.textContent = "Submitting...";
  status.style.color = "#c7c7c7";

  fetch("/api/forgot-password", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username,
      details
    })
  })
  .then(r => r.json())
  .then(d => {
    if (!d.success) {
      status.textContent = d.error || "Reset request failed.";
      status.style.color = "#ff6666";
      return;
    }

    status.textContent = "Reset request sent. Ticket ID: " + d.ticket_id;
    status.style.color = "#22c55e";

    document.getElementById("resetDetails").value = "";
  })
  .catch(() => {
    status.textContent = "Server error.";
    status.style.color = "#ff6666";
  });
}
</script>

</body>
</html>
